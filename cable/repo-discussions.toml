[metadata]
name = "repo-discussions"
description = "Discussions for the repository selected from the repos channel"
requirements = ["gh"]

[source]
command = '''
if (-not $env:TV_REPO) { throw "TV_REPO is not set" }
function Invoke-Gh {
  param([scriptblock]$Command)

  $result = & $Command 2>&1
  if ($LASTEXITCODE -ne 0) {
    $message = ($result | Out-String).Trim()
    if (-not $message) {
      $message = "gh command failed"
    }
    $message = ($message -replace "[`r`n`t]+", " ")
    throw $message
  }

  return $result
}

$parts = $env:TV_REPO -split "/", 2
if ($parts.Length -ne 2 -or [string]::IsNullOrWhiteSpace($parts[0]) -or [string]::IsNullOrWhiteSpace($parts[1])) {
  throw "TV_REPO must use the owner/name format"
}
$query = @"
query {
  repository(owner: "$($parts[0])", name: "$($parts[1])") {
    discussions(first: 100, orderBy: {field: UPDATED_AT, direction: DESC}) {
      nodes {
        number
        title
        updatedAt
        url
        author { login }
        category { name }
      }
    }
  }
}
"@
$fallbackUrl = "https://github.com/$env:TV_REPO/discussions"
try {
  $rows = Invoke-Gh {
    gh api graphql -f query="$query" --jq '.data.repository.discussions.nodes[] | [.number, .title, (.category.name // "Discussion"), (.author.login // "unknown"), .updatedAt, .url] | @tsv'
  }
  if ($rows) {
    $rows
  } else {
    "0`tNo discussions`tDiscussion`t-`t-`t$fallbackUrl`t"
  }
} catch {
  $errorMessage = ($_.Exception.Message -replace "[`r`n`t]+", " ")
  "0`tUnable to load discussions`tDiscussion`t-`t-`t$fallbackUrl`t$errorMessage"
}
'''
display = "#{split:\t:0} {split:\t:1} [{split:\t:2}, {split:\t:3}, {split:\t:4}]"
output = "{split:\t:5}"

[preview]
command = '''
function Invoke-Gh {
  param([scriptblock]$Command)

  $result = & $Command 2>&1
  if ($LASTEXITCODE -ne 0) {
    $message = ($result | Out-String).Trim()
    if (-not $message) {
      $message = "gh command failed"
    }
    $message = ($message -replace "[`r`n`t]+", " ")
    throw $message
  }

  return $result
}

$discussionNumber = '{split:\t:0}'
$discussionTitle = '{split:\t:1}'
$discussionUrl = '{split:\t:5}'
$discussionError = '{split:\t:6}'

if ($discussionNumber -eq '0') {
  if ($discussionTitle -like 'Unable to load*') {
    if (-not $discussionError) {
      $discussionError = "Unable to load discussions for $env:TV_REPO"
    }
    $discussionError
    ""
    "Open the list page: $discussionUrl"
  } else {
    "No discussions for $env:TV_REPO"
    ""
    "Open the list page: $discussionUrl"
  }
} else {
  $parts = $env:TV_REPO -split "/", 2
  $query = @"
query {
  repository(owner: "$($parts[0])", name: "$($parts[1])") {
    discussion(number: $discussionNumber) {
      title
      body
      updatedAt
      url
      category { name }
      author { login }
      comments(first: 20) {
        nodes {
          author { login }
          updatedAt
          body
        }
      }
    }
  }
}
"@
  try {
    $json = @(Invoke-Gh { gh api graphql -f query="$query" }) -join "`n"
    $data = $json | ConvertFrom-Json
    $discussion = $data.data.repository.discussion
    if (-not $discussion) {
      "Discussion not found"
      exit 0
    }
    $lines = New-Object System.Collections.Generic.List[string]
    $lines.Add($discussion.title)
    $lines.Add("")
    $lines.Add("Category: $($discussion.category.name)")
    $lines.Add("Author: $($discussion.author.login)")
    $lines.Add("Updated: $($discussion.updatedAt)")
    $lines.Add("URL: $($discussion.url)")
    $lines.Add("")
    $lines.Add($discussion.body)
    if ($discussion.comments.nodes.Count -gt 0) {
      $lines.Add("")
      $lines.Add("Comments")
      foreach ($comment in $discussion.comments.nodes) {
        $lines.Add("")
        $lines.Add("- $($comment.author.login) [$($comment.updatedAt)]")
        $lines.Add($comment.body)
      }
    }
    $lines -join "`n"
  } catch {
    "Preview error for discussion #$discussionNumber`n$($_.Exception.Message)"
  }
}
'''
header = "Discussions: {env:TV_REPO}"

[keybindings]
enter = "actions:open"

[actions.open]
description = "Open discussion in browser"
command = "Start-Process '{split:\\t:5}'"
mode = "execute"
