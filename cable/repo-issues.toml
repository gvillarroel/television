[metadata]
name = "repo-issues"
description = "Issues for the repository selected from the repos channel"
requirements = ["gh"]

[source]
command = '''
if (-not $env:TV_REPO) { throw "TV_REPO is not set" }
function Invoke-Gh {
  param([scriptblock]$Command)

  $result = & $Command 2>&1
  if ($LASTEXITCODE -ne 0) {
    $message = ($result | Out-String).Trim()
    if (-not $message) {
      $message = "gh command failed"
    }
    $message = ($message -replace "[`r`n`t]+", " ")
    throw $message
  }

  return $result
}

$fallbackUrl = "https://github.com/$env:TV_REPO/issues"
try {
  $rows = Invoke-Gh {
    gh issue list --repo $env:TV_REPO --state open --limit 200 --json number,title,author,updatedAt,url --jq '.[] | [.number, .title, (.author.login // "unknown"), .updatedAt, .url] | @tsv'
  }
  if ($rows) {
    $rows
  } else {
    "0`tNo open issues`t-`t-`t$fallbackUrl`t"
  }
} catch {
  $errorMessage = ($_.Exception.Message -replace "[`r`n`t]+", " ")
  "0`tUnable to load issues`t-`t-`t$fallbackUrl`t$errorMessage"
}
'''
display = "#{split:\t:0} {split:\t:1} [{split:\t:2}, {split:\t:3}]"
output = "{split:\t:4}"

[preview]
command = '''
function Invoke-Gh {
  param([scriptblock]$Command)

  $result = & $Command 2>&1
  if ($LASTEXITCODE -ne 0) {
    $message = ($result | Out-String).Trim()
    if (-not $message) {
      $message = "gh command failed"
    }
    throw $message
  }

  return $result
}

$issueNumber = '{split:\t:0}'
$issueTitle = '{split:\t:1}'
$issueUrl = '{split:\t:4}'
$issueError = '{split:\t:5}'

if ($issueNumber -eq '0') {
  if ($issueTitle -like 'Unable to load*') {
    if (-not $issueError) {
      $issueError = "Unable to load issues for $env:TV_REPO"
    }
    $issueError
    ""
    "Open the list page: $issueUrl"
  } else {
    "No open issues for $env:TV_REPO"
    ""
    "Open the list page: $issueUrl"
  }
} else {
  try {
    Invoke-Gh { gh issue view $issueNumber --repo $env:TV_REPO --comments }
  } catch {
    "Preview error for issue #$issueNumber`n$($_.Exception.Message)"
  }
}
'''
header = "Issues: {env:TV_REPO}"

[keybindings]
enter = "actions:open"

[actions.open]
description = "Open issue in browser"
command = "Start-Process '{split:\\t:4}'"
mode = "execute"
